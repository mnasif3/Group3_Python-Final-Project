<!DOCTYPE html>
<html>
<head>
    <title>Client Job Scheduler</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 40px;
        }

        h1 {
            text-align: center;
        }

        .navbar {
            text-align: center;
            margin-bottom: 20px;
        }

        .navbar a {
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            margin: 5px;
            border-radius: 5px;
        }

        .navbar a:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            background: white;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th {
            background: #333;
            color: white;
        }

        .pending {
            color: orange;
            font-weight: bold;
        }

        .completed {
            color: green;
            font-weight: bold;
        }
    </style>

</head>
<body>

<h1>Client Job Scheduler</h1>

<div class="navbar">
    <a href="{% url 'clients' %">Add Client</a>
    <a href="{% url 'jobs' %}">Add Job</a>
    <a href="{% url 'schedule' %}">Schedule Job</a>
</div>

<hr>

<h2>Clients</h2>

<table>
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
</tr>


<tr>

</tr>

<tr>
    <td colspan="3">No clients yet.</td>
</tr>


</table>


<h2>Jobs</h2>

<table>
<tr>
    <th>Client</th>
    <th>Job Title</th>
    <th>Description</th>
    <th>Scheduled Date</th>
    <th>Type</th>
</tr>




<tr>
    <td colspan="5">No jobs created.</td>
</tr>


</table>


<h2>Scheduled Jobs</h2>

<table>
<tr>
    <th>Job</th>
    <th>Scheduled Time</th>
    <th>Status</th>
    <th>Completed At</th>
</tr>


<tr>





<tr>
    <td colspan="4">No schedules yet.</td>
</tr>


</table>

</body>
</html>
