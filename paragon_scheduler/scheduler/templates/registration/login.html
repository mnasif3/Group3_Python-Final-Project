{% extends 'scheduler/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
  <h2>Login</h2>
  {% if form.errors %}
    <p style="color: red;">Invalid username or password.</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div>
      <label>Username<br>{{ form.username }}</label>
    </div>
    <div>
      <label>Password<br>{{ form.password }}</label>
    </div>
    <button type="submit">Login</button>
  </form>
{% endblock %}
